<!-- LOGIN SECTION -->
<section class="py-16 px-8">
    <div class="container mx-auto max-w-md">

        <!-- Title -->
        <div class="text-center mb-10">
            <h1 class="text-6xl font-bold text-gray-900 mb-2">
                Welcome back!
            </h1>
            <p class="text-gray-400 text-xl">
                Log in to access your tutorials and templates.
            </p>
        </div>

        <!-- Login form -->
        <div class="border border-gray-200 rounded-2xl p-8">

            <!-- Email -->
            <div class="mb-6">
                <label class="block text-2xl font-medium text-gray-700 mb-2">
                    Email address
                </label>
                <input
                        type="email"
                        placeholder="you@email.com"
                        class="w-full border border-gray-200 rounded-full px-6 py-3 text-2xl text-gray-600 focus:outline-none focus:border-pink-300"
                />
            </div>

            <!-- Password -->
            <div class="mb-8">
                <label class="block text-2xl font-medium text-gray-700 mb-2">
                    Password
                </label>
                <input
                        type="password"
                        placeholder="••••••••"
                        class="w-full border border-gray-200 rounded-full px-6 py-3 text-2xl text-gray-600 focus:outline-none focus:border-pink-300"
                />
                <!-- Forgot password link -->
                <p class="text-right mt-2">
                    <a href="#" class="text-pink-300 text-2xl hover:text-pink-400">
                        Forgot password?
                    </a>
                </p>
            </div>

            <!-- Login button -->
            <button class="w-full bg-pink-300 text-white rounded-full py-3 text-2xl font-medium hover:bg-pink-400">
                Log in
            </button>

            <!-- Divider -->
            <div class="text-center my-6 text-gray-300 text-2xl">or</div>

            <!-- Sign up link -->
            <p class="text-center text-2xl text-gray-500">
                Don't have an account?
                <a href="../access/" class="text-pink-300 font-medium hover:text-pink-400">
                    Get access
                </a>
            </p>

        </div>
    </div>
</section>
